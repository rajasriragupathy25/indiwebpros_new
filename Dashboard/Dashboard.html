<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<header class="navbar">
    <h1 class="logo">NETFLIX</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
    </nav>
</header>

<!-- Profile Section -->
<section class="profile">
    <h2>Welcome, User 👋</h2>
    <p>Enjoy your favourite movies and TV shows.</p>
</section>

<!-- Continue Watching -->
<section class="row">
    <h2>Continue Watching</h2>

    <div class="row-posters">
        <img src="images/avatar.jpg" alt="Avatar">
        <img src="images/johnwick.jpg" alt="John Wick">
        <img src="images/interstellar.jpg" alt="Interstellar">
        <img src="images/spiderman.jpg" alt="Spider-Man">
    </div>
</section>

<!-- Recommended -->
<section class="row">
    <h2>Recommended For You</h2>

    <div class="row-posters">
        <img src="images/batman.jpg" alt="Batman">
        <img src="images/joker.jpg" alt="Joker">
        <img src="images/oppenheimer.jpg" alt="Oppenheimer">
        <img src="images/extraction.jpg" alt="Extraction">
    </div>
</section>

<!-- My List -->
<section class="row">
    <h2>My List</h2>

    <div class="row-posters">
        <img src="images/avatar.jpg" alt="Avatar">
        <img src="images/avengers.jpg" alt="Avengers">
        <img src="images/spiderman.jpg" alt="Spider-Man">
        <img src="images/interstellar.jpg" alt="Interstellar">
    </div>
</section>

<footer>
    <p>© 2026 Netflix Clone. All Rights Reserved.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
