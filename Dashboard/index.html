<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<header class="navbar">
    <h1 class="logo">NETFLIX</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
    </nav>
</header>

<!-- Banner -->
<section class="banner">
    <div class="banner-content">
        <h1>Unlimited Movies, TV Shows and More</h1>
        <p>Watch anywhere. Cancel anytime.</p>

        <button class="play-btn">▶ Play</button>
        <button class="info-btn">More Info</button>
    </div>
</section>

<!-- Trending -->
<section class="row">
    <h2>Trending Now</h2>

    <div class="row-posters">
        <img src="images/avatar.jpg" alt="Avatar">
        <img src="images/avengers.jpg" alt="Avengers">
        <img src="images/spiderman.jpg" alt="Spider-Man">
        <img src="images/johnwick.jpg" alt="John Wick">
        <img src="images/joker.jpg" alt="Joker">
    </div>
</section>

<!-- Popular -->
<section class="row">
    <h2>Popular on Netflix</h2>

    <div class="row-posters">
        <img src="images/batman.jpg" alt="Batman">
        <img src="images/interstellar.jpg" alt="Interstellar">
        <img src="images/oppenheimer.jpg" alt="Oppenheimer">
        <img src="images/extraction.jpg" alt="Extraction">
        <img src="images/avatar.jpg" alt="Avatar">
    </div>
</section>

<!-- Top Rated -->
<section class="row">
    <h2>Top Rated</h2>

    <div class="row-posters">
        <img src="images/joker.jpg" alt="Joker">
        <img src="images/spiderman.jpg" alt="Spider-Man">
        <img src="images/batman.jpg" alt="Batman">
        <img src="images/johnwick.jpg" alt="John Wick">
        <img src="images/interstellar.jpg" alt="Interstellar">
    </div>
</section>

<footer>
    <p>© 2026 Netflix Clone. All Rights Reserved.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
