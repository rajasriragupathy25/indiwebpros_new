<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Login</title>

    <link rel="stylesheet" href="css/login.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="overlay">

        <!-- Logo -->
        <img src="assets/netflix-logo.png" class="logo" alt="Netflix Logo">

        <!-- Login Box -->
        <div class="login-box">

            <h1>Sign In</h1>

            <form id="loginForm">

                <input
                    type="email"
                    id="email"
                    placeholder="Email or mobile number"
                    required>

                <div class="password-box">

                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required>

                    <i class="fa-solid fa-eye" id="togglePassword"></i>

                </div>

                <button type="submit">
                    Sign In
                </button>

            </form>

            <div class="options">

                <label>
                    <input type="checkbox">
                    Remember me
                </label>

                <a href="#">
                    Need Help?
                </a>

            </div>

            <p class="signup-text">
                New to Netflix?

                <a href="signup.html">
                    Sign up now
                </a>

            </p>

        </div>

    </div>

<script src="js/login.js"></script>

</body>
</html>
