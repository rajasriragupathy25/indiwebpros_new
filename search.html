<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone - Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">NETFLIX</div>

        <nav>
            <ul>
                <li><a href="movie-details.html">Movie Details</a></li>
                <li><a href="#">Home</a></li>
                <li><a href="#">TV Shows</a></li>
                <li><a href="#">Movies</a></li>
            </ul>
        </nav>
    </header>

    <!-- Search Section -->
    <section class="search-section">

        <h1>Search Movies</h1>

        <div class="search-box">
            <input type="text" placeholder="Search for movies...">
            <button>Search</button>
        </div>

    </section>

    <!-- Search Results -->
    <section class="results">

        <h2>Popular Searches</h2>

        <div class="movie-grid">

            <div class="movie-card">
                <img src="images/movie1.jpg" alt="Movie">
                <h3>Wednesday</h3>
            </div>

            <div class="movie-card">
                <img src="images/movie2.jpg" alt="Movie">
                <h3>Extraction</h3>
            </div>

            <div class="movie-card">
                <img src="images/movie3.jpg" alt="Movie">
                <h3>Money Heist</h3>
            </div>

            <div class="movie-card">
                <img src="images/movie4.jpg" alt="Movie">
                <h3>Squid Game</h3>
            </div>

            <div class="movie-card">
                <img src="images/movie5.jpg" alt="Movie">
                <h3>The Witcher</h3>
            </div>

            <div class="movie-card">
                <img src="images/movie6.jpg" alt="Movie">
                <h3>Dark</h3>
            </div>

        </div>

    </section>

</body>
</html>
